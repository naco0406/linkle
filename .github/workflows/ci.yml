name: harness

# Strategy:
#   - apps/web, apps/admin  → Cloudflare Pages Git integration
#     (build + deploy handled by Cloudflare itself; this workflow does not
#     publish them. Branch protection on `main` should require `harness` to
#     pass before Pages even sees the commit.)
#   - apps/api              → deployed from here via `wrangler deploy`,
#     gated on `harness`.
#
# See docs/plan.md §9 for the runbook.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: format:check
        run: pnpm format:check

      - name: test:unit
        run: pnpm test:unit

      - name: build
        run: pnpm build

      - name: install playwright browsers
        run: pnpm --filter @linkle/e2e exec playwright install --with-deps chromium

      - name: test:e2e
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

  deploy-api:
    needs: harness
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @linkle/api run deploy --env production
