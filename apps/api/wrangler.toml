name = "linkle-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Top-level D1 binding used by `wrangler dev` (local) when no --env flag is
# passed. Cloudflare does NOT inherit d1_databases into named environments, so
# env.production / env.staging each declare their own binding below.
[[d1_databases]]
binding = "DB"
database_name = "linkle-db"
database_id = "0b50fddc-51f4-437c-ad2a-d653606a1aaf"
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put`):
#   OPENAI_API_KEY       — used for similarity scoring
#   ADMIN_JWT_SECRET     — HS256 key for admin sessions

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174"
OPENAI_MODEL = "gpt-5.4-mini"

# ─── staging ──────────────────────────────────────────────────────────────
[env.staging]
name = "linkle-api-staging"
vars = { ALLOWED_ORIGINS = "https://staging.linkle.kr,https://admin-staging.linkle.kr", OPENAI_MODEL = "gpt-5.4-mini" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "linkle-db"
database_id = "0b50fddc-51f4-437c-ad2a-d653606a1aaf"
migrations_dir = "migrations"

# ─── production ───────────────────────────────────────────────────────────
[env.production]
name = "linkle-api"
# `.pages.dev` URLs are allowed until the custom domains are wired up.
# OPENAI_BASE_URL defaults to the official endpoint; set it to a Cloudflare
# AI Gateway URL (`https://gateway.ai.cloudflare.com/v1/<account>/<gateway>/openai`)
# once the gateway is provisioned, so scoring calls originate from a region
# OpenAI allows. Leave blank to keep using the direct endpoint.
vars = { ALLOWED_ORIGINS = "https://linkle.kr,https://admin.linkle.kr,https://linkle-web.pages.dev,https://linkle-admin.pages.dev", OPENAI_MODEL = "gpt-5.4-mini", OPENAI_BASE_URL = "https://gateway.ai.cloudflare.com/v1/707520b736099457d4810da8467ef973/default/openai" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "linkle-db"
database_id = "0b50fddc-51f4-437c-ad2a-d653606a1aaf"
migrations_dir = "migrations"
